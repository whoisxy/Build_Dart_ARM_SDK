name: Main
# Controls when the action will run. 
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
      inputs:
       TAG:
        description: 'Set a Tag'
        required: true
        default: ''

jobs:
  build-dart-sdk:
    runs-on: ubuntu-latest
    steps:
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
          root-reserve-mb: 512   
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-haskell: 'true'
          remove-android: 'true'
    - name: Checkout
      uses: actions/checkout@v6
    - name: Echo Free space
      run: |
          echo "Free space:"
          df -h
    - name: Set up Python 3.8
      uses: actions/setup-python@v6
      with:
        python-version: '3.8'
    - name: Prepare
      run: |
        sudo apt-get update
        sudo apt-get install g++-aarch64-linux-gnu 
        sudo apt-get install g++-multilib
        sudo apt-get install zip
    - name: Get Resource
      run: |
        git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
        export PATH="$PATH:$PWD/depot_tools"
        mkdir dart-sdk
        cd dart-sdk
        fetch dart
        cd sdk
        git checkout ${{ github.event.inputs.TAG }}
        ls
        sed -i "s#/data/local/tmp#/data/data/com.termux/files/home/tmp#g" runtime/bin/directory_android.cc
        sed -n '431,433p' runtime/bin/directory_android.cc
        cd ../
        echo '"custom_vars": { "download_android_deps": True, }," >> .gclient
        echo "target_os = ['android']" >> .gclient
        gclient sync
    - name: Build SDK
      run: |
        export PATH="$PATH:$PWD/depot_tools"
        cd dart-sdk/sdk
        ls tools/bots
        ./tools/build.py --no-goma -m release --arch=arm64 --os=android create_sdk
    - name: Zip SDK
      run: |
        cd dart-sdk/sdk/out
        ls
        zip -q -r dart-sdk-android-arm64.zip ReleaseAndroidARM64/dart-sdk
    - name: Get current date
      id: date
      run: echo "::set-output name=date::$(date +'%Y-%m-%d')"
    - name: Test with environment variables
      run: echo $TAG_NAME - $RELEASE_TIME
      env:
          TAG_NAME: Dart-SDK
          RELEASE_TIME: ${{ steps.date.outputs.date }}
    - name: Release SDK
      uses: ncipollo/release-action@v1
      with:
        artifacts: "dart-sdk/sdk/out/*.zip"
        tag: Dart-SDK-${{ github.event.inputs.TAG }}-${{ steps.date.outputs.date }}
        #token: ${{ secrets.RELEASE_TOKEN }}
        allowUpdates: true
