name: Main
# Controls when the action will run. 
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
      inputs:
       TAG:
        description: 'Set a Tag'
        required: true
        default: ''
permissions: write-all
jobs:
  build-dart-sdk:
    runs-on: ubuntu-latest
    steps:
    - name: Prepare
      run: |
        sudo apt-get update
        sudo apt-get install zip
    - name: Get Resource
      run: |
        git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git
        export PATH="$PATH:$PWD/depot_tools"
        mkdir dart-sdk
        cd dart-sdk
        fetch dart
        cd sdk
        git checkout ${{ github.event.inputs.TAG }}
        ls
        cd ../
        echo "=============================== new ls ==============="
        ls
        cat .gclient
        wget https://raw.githubusercontent.com/whoisxy/Build_Dart_ARM_SDK/refs/heads/main/.gclient -O .gclient
        cat .gclient
        gclient sync
    - name: Build SDK
      run: |
        export PATH="$PATH:$PWD/depot_tools"
        cd dart-sdk/sdk
        ls tools/bots
        ./tools/build.py -m release --arch=arm64 --os=android create_sdk
    - name: Zip SDK
      run: |
        cd dart-sdk/sdk/out
        ls
        zip -q -r dart-sdk-android-arm64.zip ReleaseAndroidARM64/dart-sdk
    - name: Get current date
      id: date
      run: echo "::set-output name=date::$(date +'%Y-%m-%d')"
    - name: Test with environment variables
      run: echo $TAG_NAME - $RELEASE_TIME
      env:
          TAG_NAME: Dart-SDK
          RELEASE_TIME: ${{ steps.date.outputs.date }}
    - name: Release SDK
      uses: ncipollo/release-action@v1
      with:
        artifacts: "dart-sdk/sdk/out/*.zip"
        tag: Dart-SDK-${{ github.event.inputs.TAG }}-${{ steps.date.outputs.date }}
        #token: ${{ secrets.RELEASE_TOKEN }}
        allowUpdates: true
